name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Backend - lint + kontrola syntaxe ────────────
  backend-check:
    name: Backend kontrola
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm install

      - name: Lint
        run: npx eslint . --ext .js --max-warnings 0
        continue-on-error: true

      - name: Kontrola syntaxe - nacitanie vsetkych modulov
        run: |
          node -e "
            require('./models/supabase.js');
            require('./services/aiService.js');
            require('./routes/sensors.js');
            require('./routes/plants.js');
            require('./routes/ai.js');
            require('./routes/dashboard.js');
            console.log('Vsetky moduly OK');
          "
        env:
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: eyJtest
          SUPABASE_SERVICE_KEY: eyJtest
          OPENAI_API_KEY: sk-test
          PORT: 3001
          FRONTEND_URL: http://localhost:5173

  # ── 2. Frontend - lint + build ──────────────────────
  frontend-check:
    name: Frontend kontrola
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm install

      - name: Lint
        run: npx eslint src/ --ext .js,.jsx --max-warnings 0
        continue-on-error: true

      - name: Build (produkcny)
        run: npm run build

      - name: Kontrola velkosti buildu
        run: |
          SIZE=$(du -sh dist | cut -f1)
          echo "Velkost buildu: $SIZE"

  # ── 3. Docker build test ────────────────────────────
  docker-check:
    name: Docker build test
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t smartpot-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t smartpot-frontend ./frontend

      - name: Skusobne spustenie backendu
        run: |
          docker run -d --name test-backend \
            -e SUPABASE_URL=https://test.supabase.co \
            -e SUPABASE_ANON_KEY=eyJtest \
            -e SUPABASE_SERVICE_KEY=eyJtest \
            -e OPENAI_API_KEY=sk-test \
            -e PORT=3001 \
            -e FRONTEND_URL=http://localhost \
            -p 3001:3001 \
            smartpot-backend
          sleep 3
          curl -f http://localhost:3001/api/health || (docker logs test-backend && exit 1)
          echo "Backend Docker container funguje"
          docker stop test-backend
